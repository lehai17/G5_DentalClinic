<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${blog.title}">Chi tiết bài viết</title>

    <link rel="stylesheet" th:href="@{/css/tailwind-animations.css}" />
    <link rel="stylesheet" th:href="@{/css/homepage/home.css}" />

    <style>
        body {
            margin: 0;
            background: #f3f4f6;
            color: #111827;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .page-wrap {
            max-width: 920px;
            margin: 0 auto;
            padding: 110px 18px 48px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 18px;
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }

        .article {
            background: #fff;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        .article-title {
            margin: 0 0 12px;
            font-size: 46px;
            line-height: 1.2;
            font-weight: 800;
            color: #111827;
        }

        .article-meta {
            margin-bottom: 18px;
            color: #6b7280;
            font-size: 15px;
        }

        .article-summary {
            font-size: 31px;
            line-height: 1.55;
            color: #1f2937;
            margin: 0 0 26px;
            font-weight: 500;
        }

        .article-thumb {
            display: block;
            width: 100%;
            max-width: 100%;
            border-radius: 14px;
            object-fit: cover;
            margin: 0 0 10px;
        }

        .article-caption {
            font-size: 14px;
            color: #4b5563;
            font-style: italic;
            margin: 0 0 26px;
        }

        .article-content {
            font-size: 20px;
            line-height: 1.9;
            color: #111827;
            word-break: break-word;
        }

        .article-content p {
            margin: 0 0 22px;
        }

        .article-content h2,
        .article-content h3,
        .article-content h4 {
            margin: 30px 0 16px;
            line-height: 1.35;
            color: #111827;
        }

        .article-content img {
            display: block !important;
            max-width: 100% !important;
            height: auto !important;
            margin: 28px auto 10px !important;
            border-radius: 14px;
        }

        .article-content figure.image {
            margin: 24px auto;
            text-align: center;
        }

        .article-content figure.image img {
            display: block !important;
            max-width: 100% !important;
            height: auto !important;
            margin: 0 auto !important;
            border-radius: 14px;
        }

        .article-content figure.image.image_resized {
            max-width: 100%;
        }

        .article-content figcaption {
            margin-top: 8px;
            font-size: 14px;
            color: #6b7280;
            font-style: italic;
        }

        .article-content ul,
        .article-content ol {
            margin: 0 0 22px 26px;
        }

        .article-content blockquote {
            margin: 24px 0;
            padding: 16px 20px;
            border-left: 4px solid #2563eb;
            background: #eff6ff;
            color: #1e3a8a;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .article {
                padding: 20px;
            }

            .article-title {
                font-size: 34px;
            }

            .article-summary {
                font-size: 22px;
            }

            .article-content {
                font-size: 18px;
            }

            .page-wrap {
                padding: 95px 14px 36px;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrap">
    <a th:href="@{/customer/homepage}" class="back-link">← Quay lại</a>

    <article class="article">
        <h1 class="article-title" th:text="${blog.title}"></h1>

        <div class="article-meta"
             th:text="${blog.updatedAt != null ? #temporals.format(blog.updatedAt, 'dd/MM/yyyy') : ''}">
        </div>

        <p class="article-summary"
           th:if="${!#strings.isEmpty(blog.summary)}"
           th:text="${blog.summary}">
        </p>

        <img th:if="${!#strings.isEmpty(blog.imageUrl)}"
             th:src="@{${blog.imageUrl}}"
             class="article-thumb"
             alt="Ảnh bài viết"/>

        <p class="article-caption"
           th:if="${!#strings.isEmpty(blog.imageUrl)}">
            Ảnh minh họa cho bài viết sức khỏe.
        </p>

        <div class="article-content" th:utext="${blog.content}"></div>
    </article>
</div>
</body>
</html>
