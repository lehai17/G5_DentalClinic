<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - GENZ CLINIC</title>

    <link rel="stylesheet" th:href="@{/css/register.css}">
    <script defer th:src="@{/js/register.js}"></script>
</head>
<body class="auth-body">

<main class="auth">
    <!-- LEFT: Image -->
    <aside class="auth__left">
        <div class="hero">
            <div class="hero__brand">
                    <span class="hero__logo">&#129463;</span>
                <div>
                    <div class="hero__name">GENZ CLINIC</div>
                    <div class="hero__tagline">Nâng tầm nụ cười Việt</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- RIGHT: Form -->
    <section class="auth__right">
        <div class="form-card">
            <h1 class="title">Tạo tài khoản</h1>

            <!-- Error -->
            <div class="alert alert--error" th:if="${error}">
                Email đã tồn tại!
            </div>

            <form id="registerForm" th:action="@{/register}" method="post"
                  th:object="${form}" class="form" novalidate>
                <div class="field">
                    <label class="label">Họ và tên</label>

                    <div class="input-wrap"
                         th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'">
                        <input class="input"
                               type="text"
                               th:field="*{fullName}"
                               placeholder="Ví dụ: Nguyễn Đức Lâm">
                    </div>

                    <small class="error"
                           th:if="${#fields.hasErrors('fullName')}"
                           th:errors="*{fullName}">
                    </small>
                </div>


                <div class="field">
                    <label class="label" for="phone">Số điện thoại</label>
                    <div class="input-wrap" th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid' : ''">
                        <input id="phone" class="input" type="text" th:field="*{phone}"
                               placeholder="Ví dụ: 0912345678" required inputmode="numeric" maxlength="10">
                    </div>
                    <small class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
                </div>

                <div class="field">
                    <label class="label" for="email">Email</label>
                    <div class="input-wrap" th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''">
                        <input id="email" class="input" type="email" th:field="*{email}"
                               placeholder="Ex: abc@gmail.com" required>
                    </div>
                    <small class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                </div>

                <div class="field">
                    <label class="label" for="password">Mật khẩu</label>
                    <div class="input-wrap">
                        <input id="password" class="input" type="password" name="password"
                               placeholder="Ví dụ: Matkhau@123" required>
                    </div>
                </div>

                <div class="grid2">
                    <div class="field">
                        <label class="label" for="dateOfBirth">Ngày sinh</label>
                        <div class="input-wrap">
                            <input id="dateOfBirth" class="input" type="date" th:field="*{dateOfBirth}" required>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" for="gender">Giới tính</label>
                        <div class="input-wrap">
                            <select id="gender" class="input" th:field="*{gender}" required>
                            <option value="">-- Chọn --</option>
                                <option value="MALE">Nam</option>
                                <option value="FEMALE">Nữ</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>
                    </div>
                </div>

                <label class="check">
                    <input type="checkbox" th:field="*{agree}">
                    <span>Tôi đồng ý với điều khoản và điều kiện của phòng khám</span>
                </label>
                <small class="error" th:if="${#fields.hasErrors('agree')}" th:errors="*{agree}"></small>

                <button id="signupBtn" class="btn btn--primary" type="submit">
                    <span class="btn__text">Đăng ký</span>
                    <span class="btn__spinner" aria-hidden="true"></span>
                </button>

                <div class="divider">
                    <span>HOẶC ĐĂNG KÝ</span>
                </div>

                <a class="btn btn--google" th:href="@{/oauth2/authorization/google}">
                    <span class="g">G</span>
                    <span>Đăng ký với Google</span>
                </a>

                <p class="bottom">
                    Đã có tài khoản?
                    <a class="link" th:href="@{/login}">Đăng nhập</a>
                </p>
            </form>
        </div>
    </section>
</main>
<div id="toast" class="toast" th:if="${param.registered}">
    Đăng ký thành công! Vui lòng đăng nhập.
</div>
<script>
    // auto hide
    setTimeout(() => {
        const t = document.getElementById('toast');
        if (t) t.classList.add('hide');
    }, 2500);
</script>

</body>
</html>
