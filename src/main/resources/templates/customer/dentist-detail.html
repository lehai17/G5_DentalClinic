<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Bác sĩ ' + ${dentist.fullName} + ' - Chi tiết bác sĩ'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/homepage/home.css}">
    <link rel="stylesheet" th:href="@{/css/homepage/sidebar.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --medical-50: #eff6ff;
            --medical-100: #dbeafe;
            --medical-600: #2563eb;
            --medical-700: #1d4ed8;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-600: #475569;
            --slate-900: #0f172a;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--slate-600);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .breadcrumb a {
            color: var(--medical-600);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .detail-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .dentist-hero {
            background: linear-gradient(135deg, var(--medical-600), var(--medical-700));
            padding: 4rem 2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 3rem;
        }

        .dentist-avatar {
            width: 12rem;
            height: 12rem;
            border-radius: 2rem;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            background: white;
        }

        .dentist-info h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .dentist-specialization {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.25rem 1rem;
            border-radius: 9999px;
            backdrop-filter: blur(4px);
        }

        .dentist-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.8125rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail-content {
            padding: 3rem;
        }

        .content-section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--slate-900);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title i {
            color: var(--medical-600);
        }

        .bio-text {
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--slate-600);
            white-space: pre-wrap;
        }

        .action-bar {
            background: var(--slate-50);
            padding: 2rem 3rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-book {
            background: var(--medical-600);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.125rem;
        }

        .btn-book:hover {
            background: var(--medical-700);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-back {
            color: var(--slate-600);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--slate-200);
            background: white;
        }

        .btn-back:hover {
            background: var(--slate-100);
            color: var(--slate-900);
        }

        @media (max-width: 768px) {
            .dentist-hero {
                flex-direction: column;
                text-align: center;
                padding: 3rem 1.5rem;
            }

            .dentist-stats {
                justify-content: center;
            }

            .detail-content {
                padding: 2rem 1.5rem;
            }

            .action-bar {
                flex-direction: column;
                padding: 1.5rem;
            }

            .btn-book,
            .btn-back {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body class="bg-slate-50">
    <div class="app-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/header :: header}"></div>

            <div class="container-max py-12">
                <nav class="breadcrumb">
                    <a th:href="@{/homepage}">Trang chủ</a>
                    <i class="bi bi-chevron-right"></i>
                    <a th:href="@{/homepage#dentists}">Đội ngũ bác sĩ</a>
                    <i class="bi bi-chevron-right"></i>
                    <span th:text="${dentist.fullName}"></span>
                </nav>

                <article class="detail-container">
                    <div class="dentist-hero">
                        <img th:if="${dentist.avatar != null}" th:src="${dentist.avatar}" class="dentist-avatar"
                            th:alt="${dentist.fullName}">

                        <div th:unless="${dentist.avatar != null}"
                            class="dentist-avatar flex items-center justify-center bg-white">
                            <i class="bi bi-person-fill text-6xl text-blue-200"></i>
                        </div>

                        <div class="dentist-info">
                            <span class="dentist-specialization" th:text="${dentist.specialization}"></span>
                            <h1 th:text="${dentist.fullName}"></h1>
                            <div class="dentist-stats">
                                <div class="stat-item">
                                    <span class="stat-value" th:text="${dentist.experienceYears} + '+'"></span>
                                    <span class="stat-label">Năm kinh nghiệm</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-value">4.9/5</span>
                                    <span class="stat-label">Đánh giá</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="detail-content">
                        <section class="content-section">
                            <h2 class="section-title">
                                <i class="bi bi-file-person"></i>
                                Giới thiệu chuyên gia
                            </h2>
                            <div class="bio-text"
                                th:text="${dentist.bio ?: 'Thông tin giới thiệu đang được cập nhật.'}">
                            </div>
                        </section>

                        <section class="content-section">
                            <h2 class="section-title">
                                <i class="bi bi-award"></i>
                                Chứng chỉ & Chuyên môn
                            </h2>
                            <ul class="space-y-3 text-slate-600 list-disc list-inside ml-2">
                                <li th:text="'Chuyên khoa: ' + ${dentist.specialization}"></li>
                                <li>Bác sĩ nha khoa chính quy</li>
                                <li>Chứng chỉ hành nghề nha khoa quốc tế</li>
                                <li>Tu nghiệp chuyên sâu tại các bệnh viện lớn</li>
                            </ul>
                        </section>
                    </div>

                    <div class="action-bar">
                        <a th:href="@{/customer/book(dentistId=${dentist.id})}" class="btn-book">
                            <i class="bi bi-calendar-check"></i>
                            Đặt lịch với bác sĩ
                        </a>
                        <a th:href="@{/homepage#dentists}" class="btn-back">
                            <i class="bi bi-arrow-left"></i>
                            Quay lại
                        </a>
                    </div>
                </article>
            </div>

            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>

    <script th:src="@{/js/user-dropdown.js}" defer></script>
</body>

</html>
