<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GENZ CLINIC - Đăng nhập</title>

    <link rel="stylesheet" th:href="@{/css/login.css}">
    <script defer th:src="@{/js/login.js}"></script>
</head>
<body class="login-body">

<!-- Brand top-left -->
<header class="brand">
        <div class="brand__logo" aria-hidden="true">&#129463;</div>
    <div class="brand__text">
        <div class="brand__name">GENZ CLINIC</div>
        <div class="brand__tagline">Nâng tầm nụ cười Việt</div>
    </div>
</header>

<main class="page">
    <section class="card" aria-label="Thẻ đăng nhập">
        <h1 class="title">Chào mừng quay lại</h1>
        <p class="sub">Đăng nhập vào tài khoản của bạn</p>

        <!-- Alerts -->
        <div class="alert alert--error" th:if="${param.error}">
            Sai email đăng nhập hoặc mật khẩu.
        </div>
        <div class="alert alert--success" th:if="${param.logout}">
            Bạn đã đăng xuất.
        </div>

        <!-- Form -->
        <!-- giữ action như bạn đang dùng: /do-login -->
        <!-- nếu Security config của bạn dùng loginProcessingUrl("/login") thì đổi thành th:action="@{/login}" -->
        <form id="loginForm" class="form" th:action="@{/do-login}" method="post" novalidate>
            <div class="field">
                <label class="label" for="username">Email đăng nhập</label>
                <div class="input-wrap">
                    <input id="username" class="input" type="email" name="username" placeholder="Nhập email" required>
                </div>
            </div>

            <div class="field">
                <label class="label" for="password">Mật khẩu</label>
                <div class="input-wrap">
                    <input id="password" class="input" type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <div class="row">
                <label class="remember">
                    <input type="checkbox" name="remember-me">
                    <span>Ghi nhớ đăng nhập</span>
                </label>

                <a class="link" th:href="@{/forgot-password}">Quên mật khẩu?</a>
            </div>

            <div class="btns">
                <button id="loginBtn" class="btn btn--primary" type="submit">
                    <span class="btn__text">Đăng nhập</span>
                    <span class="btn__spinner" aria-hidden="true"></span>
                </button>

                <a class="btn btn--google" th:href="@{/oauth2/authorization/google}">
                    <span class="g">G</span>
                    <span>Đăng nhập với Google</span>
                </a>
            </div>

            <p class="bottom">
                Chưa có tài khoản?
                <a class="link link--accent" th:href="@{/register}">Đăng ký</a>
            </p>
        </form>
    </section>
</main>

</body>
</html>
