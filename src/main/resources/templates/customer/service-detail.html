<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${service.name} + ' - Chi tiết dịch vụ'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/homepage/home.css}">
    <link rel="stylesheet" th:href="@{/css/homepage/sidebar.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --medical-50: #eff6ff;
            --medical-100: #dbeafe;
            --medical-600: #2563eb;
            --medical-700: #1d4ed8;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-600: #475569;
            --slate-900: #0f172a;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--slate-600);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .breadcrumb a {
            color: var(--medical-600);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .detail-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .service-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .service-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--slate-900);
            line-height: 1.2;
        }

        .service-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--medical-600);
            background: var(--medical-50);
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
        }

        .service-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--slate-50);
            border-radius: 1rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--slate-600);
        }

        .meta-item i {
            font-size: 1.25rem;
            color: var(--medical-600);
        }

        .service-description {
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--slate-600);
            margin-bottom: 2.5rem;
            white-space: pre-wrap;
        }

        .action-bar {
            display: flex;
            gap: 1rem;
            border-top: 1px solid var(--slate-200);
            padding-top: 2rem;
        }

        .btn-book {
            background: var(--medical-600);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.125rem;
        }

        .btn-book:hover {
            background: var(--medical-700);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-back {
            color: var(--slate-600);
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--slate-200);
        }

        .btn-back:hover {
            background: var(--slate-100);
            color: var(--slate-900);
        }
    </style>
</head>

<body class="bg-slate-50">
    <div class="app-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/header :: header}"></div>

            <div class="container-max py-12">
                <nav class="breadcrumb">
                    <a th:href="@{/homepage}">Trang chủ</a>
                    <i class="bi bi-chevron-right"></i>
                    <a th:href="@{/homepage#services}">Dịch vụ</a>
                    <i class="bi bi-chevron-right"></i>
                    <span th:text="${service.name}"></span>
                </nav>

                <article class="detail-container">
                    <img th:if="${service.imageUrl != null}" th:src="${service.imageUrl}" class="service-image"
                        th:alt="${service.name}">

                    <div th:unless="${service.imageUrl != null}"
                        class="service-image flex items-center justify-center bg-gradient-to-br from-red-300 to-red-500">
                        <i class="bi bi-image text-6xl text-white"></i>
                    </div>

                    <div class="service-header">
                        <h1 class="service-title" th:text="${service.name}"></h1>
                        <span class="service-price"
                            th:text="${#numbers.formatDecimal(service.price, 0, 'POINT', 0, 'POINT')} + ' VNĐ'"></span>
                    </div>

                    <div class="service-meta">
                        <div class="meta-item">
                            <i class="bi bi-clock"></i>
                            <div>
                                <p class="text-xs font-semibold uppercase tracking-wider">Thời gian</p>
                                <p class="font-bold text-slate-900" th:text="${service.durationMinutes} + ' phút'"></p>
                            </div>
                        </div>
                        <div class="meta-item">
                            <i class="bi bi-shield-check"></i>
                            <div>
                                <p class="text-xs font-semibold uppercase tracking-wider">Trạng thái</p>
                                <p class="font-bold text-green-600">Đang cung cấp</p>
                            </div>
                        </div>
                    </div>

                    <div class="service-description" th:text="${service.description}">
                        Mô tả chi tiết dịch vụ sẽ được hiển thị ở đây.
                    </div>

                    <div class="action-bar">
                        <a th:href="@{/customer/book(serviceId=${service.id})}" class="btn-book">
                            <i class="bi bi-calendar-check"></i>
                            Đặt lịch ngay
                        </a>
                        <a th:href="@{/homepage#services}" class="btn-back">
                            <i class="bi bi-arrow-left"></i>
                            Quay lại
                        </a>
                    </div>
                </article>
            </div>

            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>

    <script th:src="@{/js/user-dropdown.js}" defer></script>
</body>

</html>
