<aside
  th:fragment="sidebar"
  id="sidebar"
  class="patient-sidebar"
  xmlns:th="http://www.w3.org/1999/xhtml"
>
  <div class="sidebar-header">
    <a th:href="@{/homepage}" class="logo-link" aria-label="Về trang chủ">
      <div class="logo-wrapper">
        <div class="logo-icon"></div>
        <span class="logo-text"
          >GENZ CLINIC</span
        >
      </div>
    </a>
    <button type="button" class="toggle-btn" id="customer-sidebar-toggle" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    <a
      th:href="@{/customer/book}"
      th:classappend="${active == 'booking'} ? ' active'"
      class="menu-item"
    >
      <i class="bi bi-calendar-plus"></i>
      <span>Đặt lịch khám</span>
    </a>

    <a
      th:href="@{/customer/my-appointments}"
      th:classappend="${active == 'appointments'} ? ' active'"
      class="menu-item"
    >
      <i class="bi bi-calendar2-check"></i>
      <span>Lịch hẹn của tôi</span>
    </a>

    <a
      th:href="@{/customer/payments}"
      th:classappend="${active == 'payments'} ? ' active'"
      class="menu-item"
    >
      <i class="bi bi-receipt"></i>
      <span>Lịch sử thanh toán</span>
    </a>

    <a
      th:href="@{/customer/vouchers}"
      th:classappend="${active == 'vouchers'} ? ' active'"
      class="menu-item"
    >
      <i class="bi bi-ticket-perforated"></i>
      <span>Ví voucher</span>
    </a>

    <a
      th:href="@{/patient/medical-records}"
      th:classappend="${active == 'records'} ? ' active'"
      class="menu-item"
    >
      <i class="bi bi-file-medical"></i>
      <span>Hồ sơ bệnh án</span>
    </a>

    <a
      th:href="@{/support/my}"
      th:classappend="${active == 'support'} ? ' active'"
      class="menu-item"
    >
      <i class="bi bi-headset"></i>
      <span>Hỗ trợ chuyên môn</span>
    </a>
  </nav>


  <div class="sidebar-footer">
    <a th:href="@{/logout}" class="menu-item logout">
      <i class="bi bi-box-arrow-right"></i>
      <span>Đăng xuất</span>
    </a>
  </div>
</aside>

<script>
  window.toggleSidebar = function () {
    const sidebar = document.getElementById("sidebar");
    const body = document.body;
    const mainNodes = document.querySelectorAll(".main-content");

    if (!sidebar) return;

    const willCollapse = !sidebar.classList.contains("collapsed");
    sidebar.classList.toggle("collapsed", willCollapse);
    body.classList.toggle("sidebar-collapsed", willCollapse);
    mainNodes.forEach(function (node) {
      node.classList.toggle("sidebar-collapsed", willCollapse);
    });

    try {
      localStorage.setItem("customerSidebarCollapsed", willCollapse ? "1" : "0");
    } catch (e) {}
  };

  document.addEventListener("DOMContentLoaded", function () {
    const sidebar = document.getElementById("sidebar");
    const body = document.body;
    const mainNodes = document.querySelectorAll(".main-content");

    if (!sidebar) return;

    let collapsed = false;
    try {
      collapsed = localStorage.getItem("customerSidebarCollapsed") === "1";
    } catch (e) {}

    sidebar.classList.toggle("collapsed", collapsed);
    body.classList.toggle("sidebar-collapsed", collapsed);
    mainNodes.forEach(function (node) {
      node.classList.toggle("sidebar-collapsed", collapsed);
    });
  });
</script>
