<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Phiếu hỗ trợ</title>

  <link rel="stylesheet" th:href="@{/css/dentist/app.css}"/>
  <link rel="stylesheet" th:href="@{/css/dentist/support.css}"/>
</head>

<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" style="display:flex;flex-direction:column;height:100vh;">
    <div class="sidebar-top">
      <div class="brand-mini">
        <div class="brand-badge">D+</div>
        <div style="font-weight:800">DentalPlus</div>
      </div>
    </div>

    <nav class="nav">
      <a class="nav-item" href="/dentist/dashboard">Tổng quan</a>
      <a class="nav-item" href="/dentist/notifications">
        <span>Thông báo</span>
        <span class="nav-badge" th:if="${unreadCount != null and unreadCount > 0}" th:text="${unreadCount}">0</span>
      </a>
      <a class="nav-item" href="/dentist/work-schedule">Lịch làm việc</a>
      <a class="nav-item" href="/dentist/examined-patients">Bệnh nhân của tôi</a>
      <a class="nav-item" href="/dentist/busy-schedule">Lịch bận</a>
      <a class="nav-item active" href="/dentist/support">Phiếu hỗ trợ</a>
      <a class="nav-item" href="/dentist/profile">Hồ sơ</a>
    </nav>

    <div style="margin-top:auto;">
      <a class="nav-item danger" href="/logout">Đăng xuất</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="color:var(--muted);font-size:12px;">Chuyên mục › Phiếu hỗ trợ</div>
    </div>

    <div class="content">
      <div class="support-wrapper">
        <div class="support-title">Phiếu hỗ trợ</div>
        <div class="support-sub">Các câu hỏi của bệnh nhân liên quan tới ca khám của bạn</div>

        <table class="support-table">
          <thead>
          <tr>
            <th>BỆNH NHÂN</th>
            <th>THỜI ĐIỂM TẠO</th>
            <th>DỊCH VỤ</th>
            <th>TIÊU ĐỀ</th>
            <th>TRẠNG THÁI</th>
            <th>HÀNH ĐỘNG</th>
          </tr>
          </thead>

          <tbody>
          <tr th:each="t : ${tickets}">
            <td th:text="${t.customerDisplayName != null and !#strings.isEmpty(t.customerDisplayName) ? t.customerDisplayName : 'Bệnh nhân'}"></td>
            <td th:text="${t.createdAt != null ? #temporals.format(t.createdAt,'dd/MM/yyyy HH:mm') : '-'}"></td>
            <td th:text="${t.serviceLabel}"></td>
            <td th:text="${t.title != null and !#strings.isEmpty(t.title) ? #strings.abbreviate(t.title, 60) : '(Không có tiêu đề)'}"></td>
            <td>
              <span th:class="'badge ' + (${t.displayStatus} == 'OPEN' ? 'open' : 'closed')"
                    th:text="${t.displayStatus}"></span>
            </td>
            <td>
              <a class="action-link" th:href="@{'/dentist/support/' + ${t.id}}">Xem chi tiết →</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
