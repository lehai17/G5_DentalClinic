<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Hồ sơ bác sĩ</title>

    <link rel="stylesheet" th:href="@{/css/dentist/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/dentist/profile.css}"/>
</head>

<body>
<div class="app-shell">
    <aside class="sidebar" style="display:flex;flex-direction:column;height:100vh;">
        <div class="sidebar-top">
            <div class="brand-mini">
                <div class="brand-badge">D+</div>
                <div style="font-weight:800">DentalPlus</div>
            </div>
        </div>

        <nav class="nav">
            <a class="nav-item" href="/dentist/dashboard">Tổng quan</a>
            <a class="nav-item" href="/dentist/notifications">
                <span>Thông báo</span>
                <span class="nav-badge" th:if="${unreadCount != null and unreadCount > 0}" th:text="${unreadCount}">0</span>
            </a>
            <a class="nav-item" href="/dentist/work-schedule">Lịch làm việc</a>
            <a class="nav-item" href="/dentist/examined-patients">Bệnh nhân của tôi</a>
            <a class="nav-item" href="/dentist/busy-schedule">Lịch bận</a>
            <a class="nav-item" href="/dentist/support">Phiếu hỗ trợ</a>
            <a class="nav-item active" href="/dentist/profile">Hồ sơ</a>
        </nav>

        <div style="margin-top:auto;">
            <a class="nav-item danger" href="/logout">Đăng xuất</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div style="color:var(--muted);font-size:12px;">Chuyên mục › Hồ sơ</div>
        </div>

        <div class="content">
            <div class="profile-header">
                <h1>Hồ sơ bác sĩ</h1>
                <p>Quản lý thông tin nghề nghiệp và tài khoản của bạn.</p>
            </div>

            <div class="card large">
                <h3>Thông tin tài khoản</h3>
                <div class="grid-2">
                    <div>
                        <label>Email</label>
                        <div class="readonly" th:text="${user.email}"></div>
                    </div>

                    <div>
                        <label>Giới tính</label>
                        <div class="readonly" th:text="${user.gender}"></div>
                    </div>

                    <div>
                        <label>Ngày sinh</label>
                        <div class="readonly" th:text="${#temporals.format(user.dateOfBirth,'MM/dd/yyyy')}"></div>
                    </div>

                    <div>
                        <label>Tuổi</label>
                        <div class="readonly" th:text="${age} + ' tuổi'"></div>
                    </div>

                    <div>
                        <label>Tham gia từ</label>
                        <div class="readonly" th:text="${#temporals.format(user.createdAt,'MMMM dd, yyyy')}"></div>
                    </div>
                </div>
            </div>

            <div class="card large">
                <h3>Thông tin chuyên môn</h3>
                <div class="grid-2">
                    <div>
                        <label>Họ và tên</label>
                        <div class="readonly" th:text="${profile.fullName}"></div>
                    </div>

                    <div>
                        <label>Phone</label>
                        <div class="readonly" th:text="${profile.phone}"></div>
                    </div>

                    <div>
                        <label>Chuyên môn</label>
                        <div class="readonly" th:text="${profile.specialization}"></div>
                    </div>

                    <div>
                        <label>Kinh nghiệm</label>
                        <div class="readonly" th:text="${profile.experienceYears} + ' năm'"></div>
                    </div>
                </div>

                <div class="bio-section">
                    <label>Tiểu sử</label>
                    <div class="readonly bio" th:text="${profile.bio}"></div>
                </div>
            </div>

            <div class="actions bottom">
                <a th:href="@{/dentist/profile/edit}" class="btn-primary">Chỉnh sửa hồ sơ</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
