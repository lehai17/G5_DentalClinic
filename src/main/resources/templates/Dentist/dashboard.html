<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tổng quan</title>

    <link rel="stylesheet" th:href="@{/css/dentist/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/dentist/dashboard.css}"/>
</head>

<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar" style="display:flex;flex-direction:column;height:100vh;">
        <div class="sidebar-top">
            <div class="brand-mini">
                <div class="brand-badge">D+</div>
                <div style="font-weight:800">DentalPlus</div>
            </div>
        </div>

        <nav class="nav">
            <a class="nav-item active" href="/dentist/dashboard">Tổng quan</a>
            <a class="nav-item" href="/dentist/work-schedule">Lịch làm việc</a>
            <a class="nav-item" href="/dentist/busy-schedule">Lịch bận</a>
            <a class="nav-item" href="/dentist/support">Phiếu hỗ trợ</a>
            <a class="nav-item" href="/dentist/profile">Hồ sơ</a>
        </nav>

        <div style="margin-top:auto;">
            <a class="nav-item danger" href="/logout">Đăng xuất</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div style="color:var(--muted);font-size:12px;">Chuyên mục › Tổng quan</div>
        </div>

        <div class="content">
            <div class="dashboard-hero">
                <h1 class="clinic-name">GENZ CLINIC</h1>
                <div class="clinic-slogan">Chăm sóc chính xác. Tự tin nở nụ cười.</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">📅</div>
                    <div class="stat-label">LỊCH HẸN HÔM NAY</div>
                    <div class="stat-value" th:text="${totalToday}">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon green">✔</div>
                    <div class="stat-label">ĐÃ HOÀN THÀNH HÔM NAY</div>
                    <div class="stat-value" th:text="${completedToday}">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon orange">⏳</div>
                    <div class="stat-label">CÒN LẠI HÔM NAY</div>
                    <div class="stat-value" th:text="${remainingToday}">0</div>
                </div>
            </div>

            <div class="overview-section">
                <h2 class="overview-title">Tổng quan hôm nay</h2>

                <div>
                    <div class="completion-box">
                        <div class="completion-header">
                            <span>Tỷ lệ hoàn thành</span>
                            <span class="completion-percent" th:text="${completionRate} + '%'">0%</span>
                        </div>

                        <div class="progress-bar">
                            <div class="progress-fill" th:style="'width:' + ${completionRate} + '%;'"></div>
                        </div>

                        <div class="completion-sub"
                             th:text="'Đã hoàn thành ' + ${completedToday} + ' / ' + ${totalToday} + ' lịch hẹn hôm nay.'">
                            Đã hoàn thành 0 / 0 lịch hẹn hôm nay.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
