<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Chỉnh sửa hồ sơ</title>

    <link rel="stylesheet" th:href="@{/css/dentist/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/dentist/profile.css}"/>
</head>

<body>
<div class="app-shell">
    <aside class="sidebar" style="display:flex;flex-direction:column;height:100vh;">
        <div class="sidebar-top">
            <div class="brand-mini">
                <div class="brand-badge">D+</div>
                <div style="font-weight:800">DentalPlus</div>
            </div>
        </div>

        <nav class="nav">
            <a class="nav-item" href="/dentist/dashboard">Tổng quan</a>
            <a class="nav-item" href="/dentist/work-schedule">Lịch làm việc</a>
            <a class="nav-item" href="/dentist/busy-schedule">Lịch bận</a>
            <a class="nav-item" href="/dentist/support">Phiếu hỗ trợ</a>
            <a class="nav-item active" href="/dentist/profile">Hồ sơ</a>
        </nav>

        <div style="margin-top:auto;">
            <a class="nav-item danger" href="/logout">Đăng xuất</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div style="color:var(--muted);font-size:12px;">Chuyên mục › Hồ sơ › Chỉnh sửa</div>
        </div>

        <div class="content">
            <div class="profile-header">
                <h1>Chỉnh sửa hồ sơ</h1>
            </div>

            <form th:action="@{/dentist/profile/edit}" th:object="${editDTO}" method="post">
                <div class="card large">
                    <h3>Thông tin tài khoản</h3>
                    <div class="grid-2">
                        <div>
                            <label>Giới tính</label>
                            <select name="gender">
                                <option value="MALE" th:selected="${editDTO.gender.name() == 'MALE'}">Nam</option>
                                <option value="FEMALE" th:selected="${editDTO.gender.name() == 'FEMALE'}">Nữ</option>
                            </select>
                        </div>

                        <div>
                            <label>Ngày sinh</label>
                            <input type="date" name="dateOfBirth" th:value="${#temporals.format(editDTO.dateOfBirth, 'yyyy-MM-dd')}" />
                        </div>
                    </div>
                </div>

                <div class="card large">
                    <h3>Thông tin chuyên môn</h3>
                    <div class="grid-2">
                        <div>
                            <label>Họ và tên</label>
                            <input type="text" name="fullName" th:value="${editDTO.fullName}" />
                        </div>

                        <div>
                            <label>Phone</label>
                            <input type="text" name="phone" th:value="${editDTO.phone}" />
                        </div>

                        <div>
                            <label>Chuyên môn</label>
                            <input type="text" name="specialization" th:value="${editDTO.specialization}" />
                        </div>

                        <div>
                            <label>Kinh nghiệm</label>
                            <input type="number" name="experienceYears" th:value="${editDTO.experienceYears}" />
                        </div>
                    </div>

                    <div class="bio-section">
                        <label>Tiểu sử</label>
                        <textarea rows="4" name="bio" th:text="${editDTO.bio}"></textarea>
                    </div>
                </div>

                <div class="actions bottom">
                    <a th:href="@{/dentist/profile}" class="btn-secondary">Hủy</a>
                    <button type="submit" class="btn-primary">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
