<!-- templates/admin/sidebar.html -->
<div class="sidebar" th:fragment="sidebar" xmlns:th="http://www.w3.org/1999/xhtml">
    <div class="logo-section">
        <span class="logo-text">GENZ CLINIC</span>
    </div>

    <div class="nav-group">
        <a th:href="@{/admin/dashboard}"
           class="nav-item"
           th:classappend="${activePage == 'dashboard' ? ' active' : ''}">
            <i class="fas fa-th-large"></i>
            <span>Dashboard</span>
        </a>

        <div class="nav-label">Quản lý người dùng</div>

        <a th:href="@{/admin/dentists}"
           class="nav-item"
           th:classappend="${activePage == 'dentists' ? ' active' : ''}">
            <i class="fas fa-stethoscope"></i>
            <span>Bác sĩ</span>
        </a>

        <a th:href="@{/admin/staff}"
           class="nav-item"
           th:classappend="${activePage == 'staff' ? ' active' : ''}">
            <i class="fas fa-users-cog"></i>
            <span>Nhân viên</span>
        </a>

        <a th:href="@{/admin/customers}"
           class="nav-item"
           th:classappend="${activePage == 'customers' ? ' active' : ''}">
            <i class="fas fa-user-friends"></i>
            <span>Khách hàng</span>
        </a>

        <div class="nav-label">Vận hành</div>

        <a th:href="@{/admin/services}"
           class="nav-item"
           th:classappend="${activePage == 'services' ? ' active' : ''}">
            <i class="fas fa-briefcase-medical"></i>
            <span>Dịch vụ</span>
        </a>

        <a th:href="@{/admin/vouchers}"
           class="nav-item"
           th:classappend="${activePage == 'vouchers' ? ' active' : ''}">
            <i class="fas fa-ticket-alt"></i>
            <span>Voucher</span>
        </a>

        <a th:href="@{/admin/slots}"
           class="nav-item"
           th:classappend="${activePage == 'slots' ? ' active' : ''}">
            <i class="fas fa-calendar-alt"></i>
            <span>Khung giờ</span>
        </a>

        <a th:href="@{/admin/busy-schedule}"
           class="nav-item"
           th:classappend="${activePage == 'busy-schedule' ? ' active' : ''}">
            <i class="fas fa-user-clock"></i>
            <span>Lịch bận</span>
        </a>

        <a th:href="@{/admin/blogs}"
           class="nav-item"
           th:classappend="${activePage == 'blogs' ? ' active' : ''}">
            <i class="fas fa-notes-medical"></i>
            <span>Bài viết sức khỏe</span>
        </a>

        <div class="nav-label">Ví tiền</div>

        <a th:href="@{/admin/wallets/transactions}"
           class="nav-item"
           th:classappend="${activePage == 'wallet-transactions' ? ' active' : ''}">
            <i class="fas fa-wallet"></i>
            <span>Giao dịch ví</span>
        </a>
    </div>

    <div class="nav-group" style="border-top: 1px solid rgba(255,255,255,0.1); padding: 15px 0; margin-bottom: 20px;">
        <a th:href="@{/logout}" class="nav-item logout-link" style="color: #FFB7B7;">
            <i class="fas fa-sign-out-alt"></i>
            <span>Đăng xuất</span>
        </a>
    </div>
</div>
