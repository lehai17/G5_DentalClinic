<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Lịch hẹn nhân viên</title>
    <link rel="stylesheet" href="/css/staff/staff.css" />
    <script src="/js/staff/staff.js" defer></script>
  </head>
  <body>
    <div class="app-wrapper">
      <div th:replace="~{staff/fragments/sidebar :: sidebar}"></div>

      <div class="main-content">
        <div th:replace="~{staff/fragments/header :: header}"></div>

        <div class="content">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
            <h2>Quản lý lịch hẹn</h2>
            <a href="/staff/walk-in-booking" class="btn-assign" style="text-decoration:none;">Book khách vãng lai</a>
          </div>

          <form method="get" th:action="@{/staff/appointments}" class="filter-form">
            <input
              type="text"
              name="keyword"
              placeholder="Tìm theo tên khách hàng..."
              th:value="${keyword}"
            />

            <input
              type="text"
              name="serviceKeyword"
              placeholder="Tìm theo dịch vụ..."
              th:value="${serviceKeyword}"
            />

            <select name="sort">
              <option value="">-- Sắp xếp theo ngày --</option>
              <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
              <option value="oldest" th:selected="${sort == 'oldest'}">Cũ nhất</option>
            </select>

            <button type="submit">Lọc</button>
          </form>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Khách hàng</th>
                <th>Ngày</th>
                <th>Giờ</th>
                <th>Dịch vụ</th>
                <th>Nha sĩ</th>
                <th>Trạng thái</th>
                <th>Thao tac</th>
              </tr>
            </thead>

            <tbody>
              <th:block th:each="a : ${appointments}">
                <tr class="appointment-summary-row" th:onclick="'toggleAppointmentDetails(' + ${a.id} + ')'">
                  <td th:text="${a.id}"></td>
                  <td th:text="${a.customer.fullName}"></td>
                  <td th:text="${a.date}"></td>
                  <td th:text="${a.startTime}"></td>
                  <td th:text="${serviceSummaries != null ? serviceSummaries[a.id] : (a.service != null ? a.service.name : 'Chưa có dịch vụ')}"></td>
                  <td th:text="${a.dentist != null ? a.dentist.fullName : 'Chưa phân công'}"></td>
                  <td th:text="${a.status}"></td>

                  <td onclick="event.stopPropagation()">
                    <div class="staff-action-group">
                      <button
                        type="button"
                        class="btn-assign"
                        th:if="${a.status.name() == 'PENDING' and a.dentist == null}"
                        th:onclick="'assignDentist(' + ${a.id} + ')'"
                      >
                        Gán BS
                      </button>

                      <button
                        type="button"
                        class="btn-confirm"
                        th:if="${a.status.name() == 'PENDING' and a.dentist != null}"
                        th:onclick="'confirmAppointment(' + ${a.id} + ')'"
                      >
                        Xác nhận
                      </button>

                      <button
                        type="button"
                        class="btn-change-dentist"
                        th:if="${(a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED') and a.dentist != null and dentistLeaveFlags != null and dentistLeaveFlags[a.id]}"
                        th:onclick="'changeDentist(' + ${a.id} + ')'"
                      >
                        Đổi nha sĩ
                      </button>

                      <button
                        type="button"
                        class="btn-checkin"
                        th:if="${a.status.name() == 'CONFIRMED'}"
                        th:onclick="'checkin(' + ${a.id} + ')'"
                      >
                        Check-in
                      </button>

                      <button
                        type="button"
                        class="btn-payment"
                        th:if="${a.status.name() == 'WAITING_PAYMENT' or a.status.name() == 'COMPLETED'}"
                        th:onclick="'viewInvoice(' + ${a.id} + ')'"
                        th:text="${a.status.name() == 'COMPLETED' ? 'Xem hóa đơn' : 'Thanh toán'}"
                      >
                        Thanh toán
                      </button>

                      <button
                        type="button"
                        class="btn-cancel"
                        th:if="${(a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED') and staffCancelableFlags != null and staffCancelableFlags[a.id]}"
                        th:onclick="'cancelAppointment(' + ${a.id} + ')'"
                      >
                        Hủy lịch
                      </button>

                      <button
                        type="button"
                        class="btn-cancel btn-disabled"
                        disabled
                        th:if="${(a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED') and (staffCancelableFlags == null or !staffCancelableFlags[a.id])}"
                        title="Chỉ được hủy trước giờ khám ít nhất 12 tiếng"
                      >
                        Hủy lịch
                      </button>

                      <a
                        class="btn-result"
                        th:if="${a.status.name() == 'COMPLETED'}"
                        th:href="@{/staff/appointments/{id}/result(id=${a.id})}"
                      >
                        Kết quả
                      </a>
                    </div>
                  </td>
                </tr>
                <tr class="appointment-detail-row" th:id="'appointment-detail-' + ${a.id}">
                  <td colspan="8">
                    <div class="appointment-detail-card">
                      <div class="appointment-detail-grid">
                        <div class="appointment-detail-item">
                          <span class="appointment-detail-label">Loại khách</span>
                          <strong th:text="${a.customer != null and a.customer.user != null and a.customer.user.email != null and #strings.endsWith(#strings.toLowerCase(a.customer.user.email), '@guest.local') ? 'Khách vãng lai' : 'Khách hàng hệ thống'}"></strong>
                        </div>
                        <div class="appointment-detail-item">
                          <span class="appointment-detail-label">Kênh liên hệ</span>
                          <strong th:text="${a.contactChannel == 'PHONE' ? 'Điện thoại' : (a.contactChannel == 'EMAIL' ? 'Email' : 'Không có')}"></strong>
                        </div>
                        <div class="appointment-detail-item">
                          <span class="appointment-detail-label">Số điện thoại / Email</span>
                          <strong th:text="${a.contactValue != null and !#strings.isEmpty(a.contactValue) ? a.contactValue : 'Không có'}"></strong>
                        </div>
                        <div class="appointment-detail-item appointment-detail-item--wide">
                          <span class="appointment-detail-label">Ghi chú</span>
                          <strong th:text="${a.notes != null and !#strings.isEmpty(a.notes) ? a.notes : 'Không có ghi chú'}"></strong>
                        </div>
                        <div class="appointment-detail-item appointment-detail-item--wide"
                             th:if="${a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED'}">
                          <span class="appointment-detail-label">Quy định hủy lịch</span>
                          <strong>Staff chỉ được hủy khi còn cách giờ khám ít nhất 12 tiếng.</strong>
                        </div>
                      </div>
                    </div>
                  </td>
                </tr>
              </th:block>
            </tbody>
          </table>

          <div class="pagination" th:if="${totalPages > 1}">
            <a
              th:if="${currentPage > 0}"
              th:href="@{/staff/appointments(page=${currentPage - 1}, keyword=${keyword}, serviceKeyword=${serviceKeyword}, sort=${sort})}"
            >
              Trước
            </a>

            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
              <a
                th:href="@{/staff/appointments(page=${i}, keyword=${keyword}, serviceKeyword=${serviceKeyword}, sort=${sort})}"
                th:text="${i + 1}"
                th:classappend="${i == currentPage} ? 'active'"
              >
              </a>
            </span>

            <a
              th:if="${currentPage < totalPages - 1}"
              th:href="@{/staff/appointments(page=${currentPage + 1}, keyword=${keyword}, serviceKeyword=${serviceKeyword}, sort=${sort})}"
            >
              Sau
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
