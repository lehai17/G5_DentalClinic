<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Lich hen nhan vien</title>
    <link rel="stylesheet" href="/css/staff/staff.css" />
    <script src="/js/staff/staff.js" defer></script>
  </head>
  <body>
    <div class="app-wrapper">
      <div th:replace="staff/fragments/sidebar :: sidebar"></div>

      <div class="main-content">
        <div th:replace="staff/fragments/header :: header"></div>

        <div class="content">
          <h2>Quan ly lich hen</h2>

          <form method="get" th:action="@{/staff/appointments}" class="filter-form">
            <input
              type="text"
              name="keyword"
              placeholder="Tim theo ten khach hang..."
              th:value="${keyword}"
            />

            <input
              type="text"
              name="serviceKeyword"
              placeholder="Tim theo dich vu..."
              th:value="${serviceKeyword}"
            />

            <select name="sort">
              <option value="">-- Sap xep theo ngay --</option>
              <option value="newest" th:selected="${sort == 'newest'}">Moi nhat</option>
              <option value="oldest" th:selected="${sort == 'oldest'}">Cu nhat</option>
            </select>

            <button type="submit">Loc</button>
          </form>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Khach hang</th>
                <th>Ngay</th>
                <th>Gio</th>
                <th>Dich vu</th>
                <th>Bac si</th>
                <th>Status</th>
                <th>Thao tac</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="a : ${appointments}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.customer.fullName}"></td>
                <td th:text="${a.date}"></td>
                <td th:text="${a.startTime}"></td>
                <td th:text="${a.service.name}"></td>
                <td th:text="${a.dentist != null ? a.dentist.fullName : 'Chua phan cong'}"></td>
                <td th:text="${a.status}"></td>

                <td>
                  <button
                    type="button"
                    class="btn-assign"
                    th:if="${a.status.name() == 'PENDING' and a.dentist == null}"
                    th:onclick="'assignDentist(' + ${a.id} + ')'"
                  >
                    Gan BS
                  </button>

                  <button
                    type="button"
                    class="btn-confirm"
                    th:if="${a.status.name() == 'PENDING' and a.dentist != null}"
                    th:onclick="'confirmAppointment(' + ${a.id} + ')'"
                  >
                    Xac nhan
                  </button>

                  <button
                    type="button"
                    class="btn-change-dentist"
                    th:if="${(a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED') and a.dentist != null and dentistLeaveFlags[a.id]}"
                    th:onclick="'changeDentist(' + ${a.id} + ')'"
                  >
                    Change dentist
                  </button>

                  <button
                    type="button"
                    class="btn-checkin"
                    th:if="${a.status.name() == 'CONFIRMED'}"
                    th:onclick="'checkin(' + ${a.id} + ')'"
                  >
                    Check-in
                  </button>

<!--                  <button-->
<!--                    type="button"-->
<!--                    class="btn-cancel"-->
<!--                    th:if="${a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED'}"-->
<!--                    th:onclick="'cancelAppointment(' + ${a.id} + ')'"-->
<!--                  >-->
<!--                    Huy-->
<!--                  </button>-->

                  <button
                    type="button"
                    class="btn-payment"
                    th:if="${a.status.name() == 'DONE'}"
                    th:onclick="'goToPayment(' + ${a.id} + ')'"
                  >
                    Thanh toan
                  </button>

                  <a
                    class="btn-result"
                    th:if="${a.status.name() == 'COMPLETED'}"
                    th:href="@{/staff/appointments/{id}/result(id=${a.id})}"
                  >
                    Result
                  </a>
                </td>
              </tr>
            </tbody>
          </table>

          <div class="pagination" th:if="${totalPages > 1}">
            <a
              th:if="${currentPage > 0}"
              th:href="@{/staff/appointments(page=${currentPage - 1}, keyword=${keyword}, serviceKeyword=${serviceKeyword}, sort=${sort})}"
            >
              Truoc
            </a>

            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
              <a
                th:href="@{/staff/appointments(page=${i}, keyword=${keyword}, serviceKeyword=${serviceKeyword}, sort=${sort})}"
                th:text="${i + 1}"
                th:classappend="${i == currentPage} ? 'active'"
              >
              </a>
            </span>

            <a
              th:if="${currentPage < totalPages - 1}"
              th:href="@{/staff/appointments(page=${currentPage + 1}, keyword=${keyword}, serviceKeyword=${serviceKeyword}, sort=${sort})}"
            >
              Sau
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
