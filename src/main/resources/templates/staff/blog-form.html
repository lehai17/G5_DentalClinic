<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${blog.id == null} ? 'Tạo bài viết sức khỏe' : 'Chỉnh sửa bài viết sức khỏe'">Tạo/Chỉnh sửa bài viết</title>
    <link rel="stylesheet" th:href="@{/css/staff/staff.css}">
    <style>
        .content {
            padding: 24px;
        }

        .page-title {
            margin: 0 0 20px;
            font-size: 36px;
            font-weight: 700;
            color: #1f2937;
        }

        .blog-form-card {
            max-width: 1100px;
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.06);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            color: #374151;
        }

        input[type="text"],
        textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .thumbnail-box {
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 14px;
            background: #f8fafc;
        }

        .thumbnail-preview {
            margin-top: 10px;
            width: 100%;
            max-width: 360px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            display: block;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .05s ease, opacity .2s;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-draft {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-submit {
            background: #1d4ed8;
            color: #fff;
        }

        .btn-back {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            background: #f3f4f6;
            color: #111827;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 600;
        }

        .hint {
            margin-top: 12px;
            color: #6b7280;
            font-size: 13px;
        }

        .flash-error {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            font-size: 14px;
        }

        .editor-note {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .ck-editor__editable_inline {
            min-height: 420px;
        }

        @media (max-width: 860px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <th:block th:replace="~{staff/fragments/sidebar :: sidebar}"></th:block>

    <div class="main-content">
        <th:block th:replace="~{staff/fragments/header :: header}"></th:block>

        <div class="content">
            <h2 class="page-title" th:text="${blog.id == null} ? 'Tạo bài viết sức khỏe' : 'Chỉnh sửa bài viết sức khỏe'"></h2>

            <div class="blog-form-card">
                <div th:if="${errorMessage}" class="flash-error" th:text="${errorMessage}"></div>

                <form th:action="@{/staff/blogs/save-draft}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id" th:if="${blog.id != null}" th:value="${blog.id}"/>

                    <div class="form-grid">
                        <div class="form-group full">
                            <label for="title">Tiêu đề <span style="color:#dc2626">*</span></label>
                            <input id="title" type="text" name="title" th:value="${blog.title}" required maxlength="255">
                        </div>

                        <div class="form-group full">
                            <label for="summary">Tóm tắt <span style="color:#dc2626">*</span></label>
                            <textarea id="summary" name="summary" rows="4" required maxlength="1000"
                                      th:text="${blog.summary}"></textarea>
                        </div>

                        <div class="form-group full">
                            <label for="thumbnailFile">Ảnh thumbnail / ảnh đầu bài</label>

                            <div class="thumbnail-box">
                                <input id="thumbnailFile" type="file" name="thumbnailFile" accept="image/*">
                                <input type="hidden" name="existingImageUrl" th:value="${blog.imageUrl}"/>

                                <div class="editor-note">
                                    Ảnh này sẽ hiển thị ở trang danh sách bài viết và đầu trang chi tiết.
                                </div>

                                <img id="thumbnailPreviewOld"
                                     class="thumbnail-preview"
                                     th:if="${!#strings.isEmpty(blog.imageUrl)}"
                                     th:src="${blog.imageUrl}" />

                                <img id="thumbnailPreviewNew"
                                     class="thumbnail-preview"
                                     style="display:none;" />
                            </div>
                        </div>

                        <div class="form-group full">
                            <label for="content">Nội dung bài viết <span style="color:#dc2626">*</span></label>
                            <textarea id="content" name="content" rows="12"
                                      th:text="${blog.content}"></textarea>
                            <div class="editor-note">
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-draft">Lưu bản nháp</button>

                        <button type="submit"
                                class="btn btn-submit"
                                th:formaction="@{/staff/blogs/submit-review}">
                            Gửi duyệt
                        </button>

                        <a th:href="@{/staff/blogs}" class="btn-back">Quay lại bài viết của tôi</a>
                    </div>

                    <p class="hint">
                        * Gửi duyệt sẽ chuyển bài sang trạng thái <strong>PENDING</strong> để quản trị viên duyệt.
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
<script>
    const thumbnailInput = document.getElementById('thumbnailFile');
    const thumbnailPreviewNew = document.getElementById('thumbnailPreviewNew');

    if (thumbnailInput) {
        thumbnailInput.addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) {
                thumbnailPreviewNew.style.display = 'none';
                return;
            }
            thumbnailPreviewNew.src = URL.createObjectURL(file);
            thumbnailPreviewNew.style.display = 'block';
        });
    }

    let blogEditor;

    function BlogUploadAdapter(loader) {
        this.loader = loader;
    }

    BlogUploadAdapter.prototype.upload = function() {
        return this.loader.file.then(file => new Promise((resolve, reject) => {
            const data = new FormData();
            data.append('upload', file);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/staff/blogs/upload-inline-image', true);

            const csrfInput = document.querySelector('input[name="_csrf"]');
            if (csrfInput) {
                xhr.setRequestHeader('X-CSRF-TOKEN', csrfInput.value);
            }

            xhr.responseType = 'json';

            xhr.addEventListener('error', () => reject('Không thể upload ảnh.'));
            xhr.addEventListener('abort', () => reject('Upload ảnh đã bị huỷ.'));
            xhr.addEventListener('load', () => {
                const response = xhr.response;

                if (!response || xhr.status >= 400) {
                    reject((response && response.message) || 'Upload ảnh thất bại.');
                    return;
                }

                resolve({ default: response.url });
            });

            xhr.send(data);
        }));
    };

    BlogUploadAdapter.prototype.abort = function() {};

    function BlogUploadAdapterPlugin(editor) {
        editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
            return new BlogUploadAdapter(loader);
        };
    }

    ClassicEditor
        .create(document.querySelector('#content'), {
            extraPlugins: [BlogUploadAdapterPlugin],
            toolbar: [
                'heading',
                '|',
                'bold', 'italic', 'link',
                '|',
                'bulletedList', 'numberedList',
                '|',
                'insertTable', 'blockQuote', 'imageUpload',
                '|',
                'undo', 'redo'
            ]
        })
        .then(editor => {
            blogEditor = editor;
        })
        .catch(error => {
            console.error(error);
        });

    document.querySelector('form').addEventListener('submit', function (e) {
        const title = document.getElementById('title').value.trim();
        const summary = document.getElementById('summary').value.trim();
        const content = blogEditor ? blogEditor.getData().trim() : '';

        if (blogEditor) {
            document.getElementById('content').value = content;
        }

        if (!title) {
            e.preventDefault();
            alert('Vui lòng nhập tiêu đề.');
            return;
        }

        if (!summary) {
            e.preventDefault();
            alert('Vui lòng nhập tóm tắt.');
            return;
        }

        if (!content) {
            e.preventDefault();
            alert('Vui lòng nhập nội dung bài viết.');
        }
    });
</script>
</body>
</html>
