<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phiếu hỗ trợ</title>
    <link rel="stylesheet" href="/css/staff/staff.css">
    <style>
        .status-open { background: #dbeafe; color: #1d4ed8; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .status-answered { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .status-closed { background: #e5e7eb; color: #374151; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .action-col form { margin-bottom: 8px; }
        .answer-input { width: 100%; min-width: 220px; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 10px; }
        .flash { margin-bottom: 12px; padding: 10px 12px; border-radius: 8px; }
        .flash-ok { background: #dcfce7; color: #166534; }
        .flash-error { background: #fee2e2; color: #991b1b; }
        .preview-line { max-width: 360px; color: #475569; line-height: 1.5; }
        .muted-line { color: #64748b; font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div th:replace="staff/fragments/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="staff/fragments/header :: header"></div>
        <div class="content">
            <h2>Quản lý phiếu hỗ trợ</h2>

            <div th:if="${successMessage}" class="flash flash-ok" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="flash flash-error" th:text="${errorMessage}"></div>

            <form method="get" th:action="@{/staff/support}" class="filter-form">
                <select name="status">
                    <option value="" th:selected="${selectedStatus == ''}">Tất cả trạng thái</option>
                    <option value="OPEN" th:selected="${selectedStatus == 'OPEN'}">Đang chờ phản hồi</option>
                    <option value="ANSWERED" th:selected="${selectedStatus == 'ANSWERED'}">Đã có phản hồi</option>
                    <option value="CLOSED" th:selected="${selectedStatus == 'CLOSED'}">Đã đóng</option>
                </select>
                <button type="submit">Lọc</button>
            </form>

            <table>
                <thead>
                <tr>
                    <th>Khách hàng</th>
                    <th>Nội dung mới nhất</th>
                    <th>Loại hỗ trợ</th>
                    <th>Trạng thái</th>
                    <th>Tạo lúc</th>
                    <th>Người xử lý</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tickets)}">
                    <td colspan="7">Không có phiếu hỗ trợ.</td>
                </tr>
                <tr th:each="ticket : ${tickets}">
                    <td th:text="${ticket.customerDisplayName != null ? ticket.customerDisplayName : '-'}"></td>
                    <td>
                        <div class="preview-line"
                             th:text="${ticket.latestCustomerMessage != null && ticket.latestCustomerMessage.length() > 120 ? ticket.latestCustomerMessage.substring(0,120) + '...' : ticket.latestCustomerMessage}"></div>
                        <div class="muted-line" th:text="${ticket.title}"></div>
                    </td>
                    <td>
                        <div class="muted-line" th:if="${ticket.appointment != null}"
                             th:text="'Ca khám #' + ${ticket.appointment.id} + ' - ' + ${#temporals.format(ticket.appointment.date, 'dd/MM/yyyy')}"></div>
                        <div class="muted-line" th:if="${ticket.appointment == null}">Hỗ trợ khác</div>
                    </td>
                    <td>
                        <span th:if="${ticket.displayStatus == 'OPEN'}" class="status-open">Đang chờ phản hồi</span>
                        <span th:if="${ticket.displayStatus == 'ANSWERED'}" class="status-answered">Đã có phản hồi</span>
                        <span th:if="${ticket.displayStatus == 'CLOSED'}" class="status-closed">Đã đóng</span>
                    </td>
                    <td th:text="${#temporals.format(ticket.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${ticket.responderDisplayName != null ? ticket.responderDisplayName : '-'}"></td>
                    <td class="action-col">
                        <form th:if="${ticket.displayStatus != 'CLOSED'}"
                              th:action="@{/staff/support/{id}/answer(id=${ticket.id})}"
                              method="post">
                            <input type="text" name="answer" class="answer-input" placeholder="Nhập phản hồi tiếp theo">
                            <button type="submit">Phản hồi</button>
                        </form>
                        <form th:if="${ticket.displayStatus != 'CLOSED'}"
                              th:action="@{/staff/support/{id}/close(id=${ticket.id})}"
                              method="post">
                            <button type="submit">Đóng ticket</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
